<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siden finnes ikke — Kalendo</title>
<meta name="theme-color" content="#127a72">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f8f8;color:#16201f;font-family:"Hanken Grotesk",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:30px}
.box{text-align:center;max-width:480px}
.logo{width:60px;height:60px;margin:0 auto 22px;display:block}
h1{font-size:64px;font-weight:800;letter-spacing:-.04em;color:#127a72;line-height:1}
h2{font-size:22px;font-weight:700;margin-top:10px;letter-spacing:-.02em}
p{font-size:15px;color:#5e6b69;margin-top:10px}
a{display:inline-block;margin-top:24px;background:#127a72;color:#fff;text-decoration:none;padding:11px 22px;border-radius:11px;font-weight:700;font-size:14px;transition:.16s}
a:hover{background:#0c5d57}
</style>
</head>
<body>
<div class="box">
  <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="11" width="52" height="48" rx="9" fill="#127a72"/>
    <rect x="6" y="11" width="52" height="13" rx="9" fill="#0c5d57"/>
    <rect x="6" y="20" width="52" height="4" fill="#0c5d57"/>
    <rect x="17" y="5" width="5" height="14" rx="2.5" fill="#0c5d57"/>
    <rect x="42" y="5" width="5" height="14" rx="2.5" fill="#0c5d57"/>
    <rect x="16" y="32" width="7" height="7" rx="1.5" fill="#fff" opacity=".45"/>
    <rect x="28.5" y="32" width="7" height="7" rx="1.5" fill="#fff" opacity=".45"/>
    <rect x="41" y="32" width="7" height="7" rx="1.8" fill="#d2553f"/>
    <rect x="16" y="44" width="7" height="7" rx="1.5" fill="#fff" opacity=".45"/>
    <rect x="28.5" y="44" width="7" height="7" rx="1.5" fill="#fff" opacity=".85"/>
    <rect x="41" y="44" width="7" height="7" rx="1.5" fill="#fff" opacity=".45"/>
  </svg>
  <h1>404</h1>
  <h2>Den datoen finnes ikke i kalenderen</h2>
  <p>Siden du leter etter er enten flyttet, slettet eller har aldri eksistert.</p>
  <a href="/">Tilbake til kalenderen</a>
</div>
</body>
</html>
